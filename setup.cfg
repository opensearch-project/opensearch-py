[bdist_rpm]
requires = python python-urllib3

[flake8]
ignore = E203, E266, E501, W503
max-line-length = 240

[tool:pytest]
junit_family=legacy
asyncio_mode=auto

[isort]
profile=black

[black]
max-line-length = 240
target-version = 'py38'

[mypy]
ignore_missing_imports=True

[mypy-opensearchpy._types.*]
ignore_errors = True

[mypy-opensearchpy.client]
disable_error_code = no-any-return

[mypy-opensearchpy._async.client]
disable_error_code = no-any-return

[mypy-opensearchpy.client.*]
disable_error_code = no-any-return

[mypy-opensearchpy._async.client.*]
disable_error_code = no-any-return

[mypy-opensearchpy.plugins]
disable_error_code = no-any-return

[mypy-opensearchpy._async.plugins]
disable_error_code = no-any-return

[mypy-opensearchpy.plugins.*]
disable_error_code = no-any-return

[mypy-opensearchpy._async.plugins.*]
disable_error_code = no-any-return

[mypy-test_opensearchpy.test_server.test_rest_api_spec]
disable_error_code = var-annotated
